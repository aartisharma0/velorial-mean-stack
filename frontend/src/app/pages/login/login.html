<div class="auth-wrapper d-flex align-items-center justify-content-center py-5 px-3">
  <div class="w-100 auth-card p-4 p-md-5">
    <!-- Logo / Brand -->
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width:64px;height:64px;background:linear-gradient(135deg,var(--veloria-primary),var(--veloria-primary-dark));">
        <i class="bi bi-gem text-white fs-3"></i>
      </div>
      <h1 class="fw-bold mb-1" style="font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--veloria-dark);">VELORIA</h1>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    @if (error) {
      <div class="alert border-0 py-2 px-3 rounded-3 mb-3 d-flex align-items-center gap-2" style="background:rgba(220,53,69,0.08);color:#dc3545;">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span class="small">{{ error }}</span>
      </div>
    }

    <form (ngSubmit)="submit()" novalidate>
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-semibold small">Email Address</label>
        <div class="input-group">
          <span class="input-group-text border-end-0" style="background:var(--veloria-pink-soft);border-color:#e0e0e0;">
            <i class="bi bi-envelope" style="color:var(--veloria-primary);"></i>
          </span>
          <input
            type="email"
            class="form-control border-start-0 ps-0"
            [(ngModel)]="form.email"
            name="email"
            placeholder="your@email.com"
            required
            autocomplete="email"
            style="border-color:#e0e0e0;"
          >
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label fw-semibold small mb-0">Password</label>
          <a routerLink="/forgot-password" class="small text-decoration-none" style="color:var(--veloria-primary);">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text border-end-0" style="background:var(--veloria-pink-soft);border-color:#e0e0e0;">
            <i class="bi bi-lock" style="color:var(--veloria-primary);"></i>
          </span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control border-start-0 border-end-0 ps-0"
            [(ngModel)]="form.password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
            style="border-color:#e0e0e0;"
          >
          <button type="button" class="input-group-text border-start-0" style="background:var(--veloria-pink-soft);border-color:#e0e0e0;cursor:pointer;" (click)="showPassword = !showPassword">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword" style="color:var(--veloria-grey);"></i>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-veloria w-100 py-2 fw-semibold mt-2" [disabled]="loading">
        @if (loading) {
          <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
        } @else {
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        }
      </button>
    </form>

    <div class="text-center mt-4 pt-3" style="border-top:1px solid #f0f0f0;">
      <p class="text-muted small mb-0">
        Don't have an account?
        <a routerLink="/register" class="fw-semibold text-decoration-none" style="color:var(--veloria-primary);">Create one free</a>
      </p>
    </div>

    <div class="text-center mt-3">
      <a routerLink="/" class="small text-decoration-none text-muted">
        <i class="bi bi-arrow-left me-1"></i>Back to Store
      </a>
    </div>
  </div>
</div>
